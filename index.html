<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Liste de cartes</title>
<style>
:root{--bg:#111318;--panel:#1a1f29;--text:#f1f5f9;--muted:#aab4c2;--line:#343d4f;--accent:#8ab4ff;--danger:#ff7b7b;--ok:#9ce6b8;--shadow:0 10px 30px rgba(0,0,0,.28)}*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at top left,#1e2940,var(--bg) 42%);min-height:100vh}header,main{max-width:1200px;margin:0 auto;padding-left:20px;padding-right:20px}header{padding-top:32px;padding-bottom:18px}h1{margin:0 0 10px;font-size:clamp(28px,4vw,44px);letter-spacing:-.04em}.subtitle{color:var(--muted);margin:0;line-height:1.5}main{padding-bottom:44px}.toolbar{position:sticky;top:0;z-index:10;display:grid;grid-template-columns:1.4fr repeat(6,minmax(140px,.5fr));gap:12px;padding:16px;background:rgba(17,19,24,.92);border:1px solid var(--line);border-radius:18px;backdrop-filter:blur(12px);box-shadow:var(--shadow);margin-bottom:18px}input,select,button{width:100%;border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:12px;padding:11px 12px;font:inherit}input::placeholder{color:#7f8ca0}button{cursor:pointer;transition:transform .12s ease,border-color .12s ease}button:hover{transform:translateY(-1px);border-color:var(--accent)}.stats{display:flex;flex-wrap:wrap;gap:10px;margin:0 0 18px;color:var(--muted)}.pill{display:inline-flex;align-items:center;gap:7px;padding:8px 10px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:999px;font-size:14px}.pill strong{color:var(--text)}.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}article.card{background:linear-gradient(180deg,var(--panel),#151a23);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;min-height:310px}.card-head{padding:16px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.035)}.topline{display:flex;align-items:flex-start;gap:10px;justify-content:space-between}.name{font-size:20px;line-height:1.15;margin:0;letter-spacing:-.02em}.mana{min-width:38px;text-align:center;border:1px solid var(--line);border-radius:999px;padding:5px 9px;color:var(--accent);background:#10141b;font-weight:700}.meta{margin-top:10px;display:flex;flex-wrap:wrap;gap:8px;color:var(--muted);font-size:13px}.tag{border:1px solid var(--line);background:rgba(255,255,255,.04);border-radius:999px;padding:5px 8px}.body{padding:16px;display:grid;gap:13px;flex:1}.rules{white-space:pre-line;line-height:1.48;color:#e5ebf4;background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:14px;padding:12px;min-height:64px}.empty{color:var(--muted);font-style:italic}dl{display:grid;grid-template-columns:auto 1fr;gap:7px 10px;margin:0;color:var(--muted);font-size:14px}dt{color:#cbd5e1}dd{margin:0;min-width:0;overflow-wrap:anywhere}.actions{display:flex;gap:10px;padding:12px 16px 16px;border-top:1px solid var(--line)}.delete{color:var(--danger)}.no-results{display:none;padding:28px;border:1px dashed var(--line);border-radius:18px;color:var(--muted);text-align:center}@media(max-width:760px){.toolbar{grid-template-columns:1fr;position:static}header{padding-top:24px}}@media print{body{background:white;color:black}.toolbar,.actions{display:none}article.card{break-inside:avoid;box-shadow:none;color:black}}
</style>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#111318">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Cartes">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
</head>
<body>
<header>
  <h1>Liste de cartes</h1>
  <p class="subtitle">Catalogue PWA avec données importées localement sur cet appareil, recherche, filtres, suppression locale et export JSON.</p>
</header>
<main>
  <section class="toolbar" aria-label="Outils de consultation">
    <input id="search" type="search" placeholder="Rechercher par nom, type, texte, illustrateur ou numéro">
    <input id="importJsonFile" type="file" accept="application/json,.json" hidden>
    <button id="importJson" type="button">Importer JSON</button>
    <select id="rarityFilter" aria-label="Filtrer par rareté"><option value="">Toutes les raretés</option></select>
    <select id="typeFilter" aria-label="Filtrer par type"><option value="">Tous les types</option></select>
    <button id="exportJson" type="button">Exporter JSON</button>
    <button id="installPwa" type="button" hidden>Installer</button>
    <button id="resetDeleted" type="button">Restaurer les suppressions</button>
  </section>
  <section class="stats" aria-label="Statistiques">
    <span class="pill"><strong id="visibleCount">0</strong> affichées</span>
    <span class="pill"><strong id="totalCount">0</strong> cartes locales</span>
    <span class="pill"><strong id="duplicateCount">0</strong> doublons exacts ignorés à l’import</span>
    <span class="pill"><strong id="deletedCount">0</strong> supprimées localement</span>
  </section>
  <section id="cards" class="cards" aria-live="polite"></section>
  <p id="noResults" class="no-results">Aucune carte ne correspond aux filtres actuels.</p>
</main>
<script id="cards-data" type="application/json">[]</script>
<script id="labels-data" type="application/json">{"name": "Nom", "mana_cost": "Coût de mana", "type": "Type", "rarity": "Rareté", "rules_text": "Texte de règle", "flavor_text": "Texte d’ambiance", "power": "Force", "toughness": "Endurance", "loyalty": "Loyauté", "illustrator": "Illustrateur", "card_number": "Numéro", "notes": "Notes"}</script>
<script id="rarities-data" type="application/json">["common", "masterpiece", "mythic rare", "rare", "uncommon"]</script>
<script id="types-data" type="application/json">["Créature : Ange et", "Créature : Animal et", "Créature : Avatar et", "Créature : Basilic et", "Créature : Clône et", "Créature : Dinosaure et", "Créature : Dragon et", "Créature : Démon et", "Créature : Elfe et", "Créature : Feu-follet et", "Créature : Gargouille et", "Créature : Gremlin et", "Créature : Génie et", "Créature : Juggernaut et", "Créature : Loup-Garou et", "Créature : Momie et", "Créature : Mort-vivant et", "Créature : Mur et", "Créature : Ogre et", "Créature : Petites-Gens et", "Créature : Phoenix et", "Créature : Prêtre et", "Créature : Pégase et", "Créature : Robot et", "Créature : Roi et", "Créature : Roi et Ange et", "Créature : Roi et Animal et", "Créature : Roi et Dragon et", "Créature : Roi et Démon et", "Créature : Roi et Mort-vivant et", "Créature : Roi et Prêtre et", "Créature : Roi et Soldat et", "Créature : Roi et Sorcier et", "Créature : Soldat et", "Créature : Sorcier et", "Créature : Spectateur et", "Créature : Spores et", "Créature : Tréant et", "Créature : Voleur et", "Créature : Élémental et", "Créature Roi de la vitesse", "Créature Roi du hockey", "Créature Roi du soccer", "Créature Roi du sport", "Enchantement : Artefact et", "Enchantement : Cible et", "Enchantement : Général et", "Instantané : Cible", "Instantané : Cible/Général", "Instantané : Général", "Instantanée : Cible", "Sorcellerie :  Cible", "Sorcellerie :  Général", "Sorcellerie : Cible", "Sorcellerie : Général"]</script>
<script>
let cards=JSON.parse(document.getElementById('cards-data').textContent);
const labels=JSON.parse(document.getElementById('labels-data').textContent);
const storagePrefix='liste-cartes-pwa-local-v2';
const cardsStorageKey=storagePrefix + ':cards';
const deletedStorageKey=storagePrefix + ':deleted';
const duplicateStorageKey=storagePrefix + ':duplicates';
const cardFields=['name','mana_cost','type','rarity','rules_text','flavor_text','power','toughness','loyalty','illustrator','card_number','notes'];
const storedCards=localStorage.getItem(cardsStorageKey);
if(storedCards){
  try{cards=JSON.parse(storedCards);}catch(error){console.warn('Données locales illisibles', error);}
}
const state={search:'',rarity:'',type:'',deleted:new Set(JSON.parse(localStorage.getItem(deletedStorageKey)||'[]')),duplicates:Number(localStorage.getItem(duplicateStorageKey)||0)};
const els={cards:document.getElementById('cards'),search:document.getElementById('search'),importJson:document.getElementById('importJson'),importJsonFile:document.getElementById('importJsonFile'),rarityFilter:document.getElementById('rarityFilter'),typeFilter:document.getElementById('typeFilter'),visibleCount:document.getElementById('visibleCount'),totalCount:document.getElementById('totalCount'),deletedCount:document.getElementById('deletedCount'),duplicateCount:document.getElementById('duplicateCount'),noResults:document.getElementById('noResults'),resetDeleted:document.getElementById('resetDeleted'),exportJson:document.getElementById('exportJson')};
function escapeHtml(value){return String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));}
function normalize(value){return String(value??'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function canonicalCard(raw,index){const card={};for(const field of cardFields){card[field]=String(raw?.[field]??'').trim();}card.id=String(raw?.id||`card-${String(index+1).padStart(4,'0')}`);return card;}
function exactKey(card){return JSON.stringify(cardFields.map(field=>card[field]??''));}
function dedupeCards(input){const seen=new Set();const output=[];let duplicates=0;for(const raw of input){const card=canonicalCard(raw,output.length);const key=exactKey(card);if(seen.has(key)){duplicates++;continue;}seen.add(key);if(output.some(existing=>existing.id===card.id)){card.id=`card-${String(output.length+1).padStart(4,'0')}`;}output.push(card);}return {cards:output,duplicates};}
function saveCards(){localStorage.setItem(cardsStorageKey,JSON.stringify(cards));}
function saveDeleted(){localStorage.setItem(deletedStorageKey,JSON.stringify([...state.deleted]));}
function saveDuplicateCount(){localStorage.setItem(duplicateStorageKey,String(state.duplicates));}
function getUniqueValues(field){return [...new Set(cards.map(card=>card[field]).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'fr'));}
function refillSelect(select,values,placeholder){const previous=select.value;select.innerHTML='';const first=document.createElement('option');first.value='';first.textContent=placeholder;select.appendChild(first);for(const value of values){const option=document.createElement('option');option.value=value;option.textContent=value;select.appendChild(option);}if(values.includes(previous))select.value=previous;}
function refreshFilters(){refillSelect(els.rarityFilter,getUniqueValues('rarity'),'Toutes les raretés');refillSelect(els.typeFilter,getUniqueValues('type'),'Tous les types');}
function cardText(card){return normalize(cardFields.map(field=>card[field]).join(' '));}
function matchesFilters(card){if(state.deleted.has(card.id))return false;if(state.rarity&&card.rarity!==state.rarity)return false;if(state.type&&card.type!==state.type)return false;if(state.search&&!cardText(card).includes(normalize(state.search)))return false;return true;}
function deleteCard(id){state.deleted.add(id);saveDeleted();render();}
window.deleteCard=deleteCard;
function renderCard(card){const stats=[card.power?`${labels.power}: ${card.power}`:'',card.toughness?`${labels.toughness}: ${card.toughness}`:'',card.loyalty?`${labels.loyalty}: ${card.loyalty}`:''].filter(Boolean).join(' · ');const details=[['illustrator',card.illustrator],['card_number',card.card_number],['flavor_text',card.flavor_text],['notes',card.notes]].filter(([,v])=>v);return `<article class="card" data-id="${escapeHtml(card.id)}"><div class="card-head"><div class="topline"><h2 class="name">${escapeHtml(card.name||'Carte sans nom')}</h2><span class="mana">${escapeHtml(card.mana_cost||'∅')}</span></div><div class="meta">${card.type?`<span class="tag">${escapeHtml(card.type)}</span>`:''}${card.rarity?`<span class="tag">${escapeHtml(card.rarity)}</span>`:''}${stats?`<span class="tag">${escapeHtml(stats)}</span>`:''}</div></div><div class="body"><div class="rules ${card.rules_text?'':'empty'}">${escapeHtml(card.rules_text||'Aucun texte de règle.')}</div>${details.length?`<dl>${details.map(([k,v])=>`<dt>${escapeHtml(labels[k])}</dt><dd>${escapeHtml(v)}</dd>`).join('')}</dl>`:''}</div><div class="actions"><button class="delete" type="button" onclick="deleteCard('${escapeHtml(card.id)}')">Supprimer</button></div></article>`;}
function getVisibleCards(){return cards.filter(matchesFilters);}
function exportJson(){const data=getVisibleCards();const payload=JSON.stringify(data,null,2);const blob=new Blob([payload],{type:'application/json;charset=utf-8'});const url=URL.createObjectURL(blob);const link=document.createElement('a');const stamp=new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');link.href=url;link.download='liste-cartes-' + stamp + '.json';document.body.appendChild(link);link.click();link.remove();URL.revokeObjectURL(url);}
async function importJsonFile(file){if(!file)return;let data;try{data=JSON.parse(await file.text());}catch(error){alert('Le fichier JSON est invalide.');return;}if(!Array.isArray(data)){alert('Le fichier doit contenir un tableau de cartes.');return;}const result=dedupeCards(data);cards=result.cards;state.duplicates=result.duplicates;state.deleted.clear();saveCards();saveDeleted();saveDuplicateCount();state.rarity='';state.type='';els.rarityFilter.value='';els.typeFilter.value='';refreshFilters();render();alert(`${cards.length} cartes importées. ${state.duplicates} doublon(s) exact(s) ignoré(s).`);}
function render(){const visible=getVisibleCards();els.cards.innerHTML=visible.map(renderCard).join('');els.visibleCount.textContent=visible.length;els.totalCount.textContent=cards.length;els.deletedCount.textContent=state.deleted.size;els.duplicateCount.textContent=state.duplicates;els.noResults.style.display=visible.length?'none':'block';if(!cards.length){els.noResults.style.display='block';els.noResults.textContent='Aucune carte locale. Importez un fichier JSON pour charger vos données sur cet appareil.';}else{els.noResults.textContent='Aucune carte ne correspond aux filtres actuels.';}}
refreshFilters();els.search.addEventListener('input',e=>{state.search=e.target.value;render();});els.rarityFilter.addEventListener('change',e=>{state.rarity=e.target.value;render();});els.typeFilter.addEventListener('change',e=>{state.type=e.target.value;render();});els.exportJson.addEventListener('click',exportJson);els.importJson.addEventListener('click',()=>els.importJsonFile.click());els.importJsonFile.addEventListener('change',e=>importJsonFile(e.target.files[0]));els.resetDeleted.addEventListener('click',()=>{state.deleted.clear();saveDeleted();render();});render();</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(error => {
      console.warn("Service worker non enregistré", error);
    });
  });
}
let deferredInstallPrompt = null;
const installButton = document.getElementById("installPwa");
window.addEventListener("beforeinstallprompt", event => {
  event.preventDefault();
  deferredInstallPrompt = event;
  if (installButton) installButton.hidden = false;
});
if (installButton) {
  installButton.addEventListener("click", async () => {
    if (!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    installButton.hidden = true;
  });
}
window.addEventListener("appinstalled", () => {
  deferredInstallPrompt = null;
  if (installButton) installButton.hidden = true;
});
</script>
</body>
</html>
